<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found — Antonio Baltic</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Inter+Tight:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2026-05">
  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="favicon-16x16.png" sizes="16x16">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#f4efe6">
  <style>
    .error {
      max-width: var(--max);
      margin: 0 auto;
      padding: clamp(4rem, 12vw, 10rem) var(--px) clamp(4rem, 8vw, 7rem);
      min-height: calc(100vh - 200px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .error-eyebrow {
      font-family: var(--f-mono);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.4rem;
    }

    .error-code {
      font-family: var(--f-display);
      font-size: clamp(6rem, 22vw, 18rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.84;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    .error-code .dot {
      color: var(--accent);
      display: inline-block;
    }

    .error-msg {
      font-family: var(--f-display);
      font-size: clamp(1.05rem, 1.6vw, 1.35rem);
      font-weight: 400;
      line-height: 1.45;
      color: var(--ink-soft);
      max-width: 38ch;
      margin-bottom: 2.5rem;
    }

    .error-msg em {
      font-style: italic;
      color: var(--muted-2);
      font-weight: 300;
    }

    .error-cta {
      display: inline-flex;
      align-items: baseline;
      gap: 0.6em;
      font-family: var(--f-mono);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 0.3em;
      transition: color 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
      align-self: flex-start;
    }

    .error-cta:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
  </style>
</head>
<body>

  <!-- ───────── Topbar ───────── -->
  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="brand" aria-label="Antonio Baltic — back to portfolio">
        <span class="brand-mark" aria-hidden="true">A·B</span>
        <span class="brand-name">Antonio Baltic</span>
      </a>
      <div class="topbar-meta">
        <a href="index.html" class="topbar-cell back-link">
          <span aria-hidden="true">←</span>
          <span class="topbar-value">Back to portfolio</span>
        </a>
      </div>
    </div>
    <div class="topbar-rule" aria-hidden="true"></div>
  </header>

  <!-- ───────── Error ───────── -->
  <main class="error">
    <p class="error-eyebrow">Error 404</p>
    <h1 class="error-code">Not<br>Found<span class="dot">.</span></h1>
    <p class="error-msg">The page you're looking for doesn't exist <em>or has been moved elsewhere.</em></p>
    <a href="index.html" class="error-cta">
      <span aria-hidden="true">←</span>
      <span>Back to portfolio</span>
    </a>
  </main>

  <!-- ───────── Footer ───────── -->
  <footer class="footer">
    <div class="footer-rule" aria-hidden="true"></div>
    <div class="footer-grid">
      <div class="footer-cell">
        <span class="footer-label">Status</span>
        <span class="footer-value">Available for new projects</span>
      </div>
      <div class="footer-cell">
        <span class="footer-label">Based</span>
        <span class="footer-value">Graz, Austria</span>
      </div>
      <div class="footer-cell">
        <span class="footer-label">Email</span>
        <span class="footer-value"><a class="link-underline" href="mailto:antoniobaltic@icloud.com">antoniobaltic@icloud.com</a></span>
      </div>
      <div class="footer-cell">
        <span class="footer-label">Elsewhere</span>
        <span class="footer-value"><a class="link-underline" href="https://github.com/antoniobaltic" target="_blank" rel="noopener">GitHub <span aria-hidden="true">↗</span></a></span>
      </div>
    </div>

    <div class="footer-bottom">
      <span class="footer-copy">© 2026 Antonio Baltic</span>
    </div>
  </footer>

</body>
</html>
