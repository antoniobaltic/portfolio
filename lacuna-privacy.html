<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — Lacuna</title>
  <meta name="description" content="Privacy Policy for the Lacuna app">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="antoniobaltic_dev_logo.png">
  <link rel="apple-touch-icon" href="antoniobaltic_dev_logo.png">
  <meta name="theme-color" content="#f4efe6">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    /* ── Privacy page overrides ─────────────────────── */
    .page-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1.2rem var(--px);
      border-bottom: 1px solid var(--border);
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    [data-theme="light"] .page-nav {
      background: rgba(244, 239, 230, 0.92);
    }

    .page-nav-back {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .page-nav-back:hover { color: var(--accent); }

    .page-nav-app {
      font-size: 0.7rem;
      color: var(--accent);
      opacity: 0.6;
      margin-left: 1rem;
      letter-spacing: 0.08em;
    }

    .policy-wrap {
      max-width: 660px;
      margin: 0 auto;
      padding: clamp(4rem, 8vw, 6rem) var(--px) clamp(5rem, 10vw, 8rem);
    }

    .policy-header {
      margin-bottom: 4rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .policy-label {
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      opacity: 0.65;
      display: block;
      margin-bottom: 1rem;
    }

    .policy-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
    }

    .policy-app {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-style: italic;
      font-weight: 300;
    }

    .policy-section {
      margin-bottom: 3rem;
    }

    .policy-section h2 {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    .policy-section p {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.85;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <button class="theme-btn" id="theme-btn" aria-label="Toggle theme">
    <span class="theme-icon" id="theme-icon">◑</span><span id="theme-label">light_mode</span>
  </button>

  <!-- ─── Nav ───────────────────────────────────────────── -->
  <nav class="page-nav">
    <a href="index.html" class="page-nav-back">← back</a>
    <span class="page-nav-app">Lacuna</span>
  </nav>

  <!-- ─── Policy ────────────────────────────────────────── -->
  <main class="policy-wrap">

    <header class="policy-header">
      <span class="policy-label">// legal</span>
      <h1 class="policy-title">Privacy Policy</h1>
      <p class="policy-app">Lacuna — iOS App</p>
    </header>

    <section class="policy-section">
      <h2>// coming soon</h2>
      <p>The privacy policy for Lacuna will be published here before the app launches.</p>
    </section>

  </main>

  <script>
    (function() {
      var btn = document.getElementById('theme-btn');
      var icon = document.getElementById('theme-icon');
      var label = document.getElementById('theme-label');
      var metaTheme = document.querySelector('meta[name="theme-color"]');
      var theme = localStorage.getItem('theme') || 'light';

      function apply(t) {
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'light') {
          icon.textContent = '◐'; label.textContent = 'dark_mode';
          if (metaTheme) metaTheme.setAttribute('content', '#f4efe6');
        } else {
          icon.textContent = '◑'; label.textContent = 'light_mode';
          if (metaTheme) metaTheme.setAttribute('content', '#0a0a0a');
        }
        localStorage.setItem('theme', t);
        theme = t;
      }

      apply(theme);
      btn.addEventListener('click', function() { apply(theme === 'dark' ? 'light' : 'dark'); });
    })();
  </script>
</body>
</html>
