<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — Orbit</title>
  <meta name="description" content="Privacy Policy for the Orbit app">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#0a0a0a">
  <style>
    /* ── Privacy page overrides ─────────────────────── */
    .page-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1.2rem var(--px);
      border-bottom: 1px solid var(--border);
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .page-nav-back {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .page-nav-back:hover { color: var(--accent); }

    .page-nav-app {
      font-size: 0.7rem;
      color: var(--accent);
      opacity: 0.6;
      margin-left: 1rem;
      letter-spacing: 0.08em;
    }

    .policy-wrap {
      max-width: 660px;
      margin: 0 auto;
      padding: clamp(4rem, 8vw, 6rem) var(--px) clamp(5rem, 10vw, 8rem);
    }

    .policy-header {
      margin-bottom: 4rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .policy-label {
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      opacity: 0.65;
      display: block;
      margin-bottom: 1rem;
    }

    .policy-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
    }

    .policy-app {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-style: italic;
      font-weight: 300;
    }

    .policy-section {
      margin-bottom: 3rem;
    }

    .policy-section h2 {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    .policy-section p {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.85;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <!-- ─── Nav ───────────────────────────────────────────── -->
  <nav class="page-nav">
    <a href="index.html" class="page-nav-back">← back</a>
    <span class="page-nav-app">Orbit</span>
  </nav>

  <!-- ─── Policy ────────────────────────────────────────── -->
  <main class="policy-wrap">

    <header class="policy-header">
      <span class="policy-label">// legal</span>
      <h1 class="policy-title">Privacy Policy</h1>
      <p class="policy-app">Orbit — iOS App</p>
    </header>

    <section class="policy-section">
      <h2>// coming soon</h2>
      <p>The privacy policy for Orbit will be published here before the app launches.</p>
    </section>

  </main>

</body>
</html>
